name: Update Hawaii Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 12:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: Paper/Code/Python

      - name: Run data generation script
        run: python getdata.py
        working-directory: Paper/Code/Python

      - name: Commit and push updated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Paper/Data/HawaiiData.xlsx
          git commit -m "Update HawaiiData.xlsx [auto]" || echo "No changes to commit"
          git push
