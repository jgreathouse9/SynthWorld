name: Run WeedMap

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  weed_map:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Debug: Print the current working directory
    - name: Print current working directory
      run: pwd

    # Debug: List contents of PolicyData/Cannabis directory
    - name: Assert that the Excel file exists
      run: |
        echo "Listing contents of PolicyData/Cannabis directory"
        ls -l PolicyData/Cannabis
        if [ ! -f "PolicyData/Cannabis/CannabisLaws.xlsx" ]; then
          echo "ERROR: Excel file not found!"
          exit 1
        fi

    # Set PYTHONPATH to include 'Python' folder for utils and scripts
    - name: Set PYTHONPATH to include 'Python'
      run: echo "PYTHONPATH=$(pwd)/Python" >> $GITHUB_ENV

    # Install dependencies from requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Python/reqs/requirements.txt

    # Run the WeedMap script
    - name: Run WeedMap script
      run: python Python/Chapter2/WeedMap.py

    # Commit unstaged changes and rebase
    - name: Commit unstaged changes and rebase
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # Check for unstaged changes and commit them
        if ! git diff --quiet; then
          git add .
          git commit -m "Auto-commit unstaged changes before rebase"
        fi

        git pull --rebase origin main

    # Commit ANY .png plot inside Figures/Chapter2/
    - name: Commit all plots to repository
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Add all PNG files in Figures/Chapter2/
        git add Figures/Chapter2/*.png
        
        # Check if there are staged changes before committing
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Add updated plots from WeedMap script"
          git push
        fi
