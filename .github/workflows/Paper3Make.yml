name: Render Quarto PDFs in Paper3 and Commit

on:
  push:
    branches:
      - main
    paths:
      - 'Paper3/Paper/*.qmd'
      - 'Paper3/Paper/preamble2.tex'
      - 'Paper3/Paper/pl.bib'

permissions:
  contents: write

jobs:
  render-and-commit-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto with TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render Quarto files to PDF
        run: |
          for file in Paper3/Paper/*.qmd; do
            if [ -f "$file" ]; then
              quarto render "$file" --to pdf
            fi
          done

      - name: Commit PDF files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Add rendered PDFs from Paper3'
          file_pattern: 'Paper3/Paper/*.pdf'
          branch: main
